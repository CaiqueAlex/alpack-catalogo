# render.yaml
databases:
  - name: alpack-db
    databaseName: alpack
    user: alpack_user
    region: oregon

services:
  - type: web
    name: alpack-web
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn website.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: alpack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".render.com"
    disk:
      name: alpack-disk
      mountPath: /opt/render/project/src/staticfiles
      sizeGB: 1